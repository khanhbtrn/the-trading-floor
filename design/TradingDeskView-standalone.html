  <div style=\"display:grid; grid-template-columns: 2fr 1fr; gap:16px;\">\n\n      <div style=\"position:relative; border:1px solid rgba(34,211,238,0.3); background:rgba(8,14,18,0.6); padding:16px; box-shadow:0 0 24px rgba(34,211,238,0.05) inset;\">\n        <div class=\"tdv-corner\" style=\"top:-1px; left:-1px; border-top:2px solid; border-left:2px solid;\"><\u002Fdiv>\n        <div class=\"tdv-corner\" style=\"top:-1px; right:-1px; border-top:2px solid; border-right:2px solid;\"><\u002Fdiv>\n        <div class=\"tdv-corner\" style=\"bottom:-1px; left:-1px; border-bottom:2px solid; border-left:2px solid;\"><\u002Fdiv>\n        <div class=\"tdv-corner\" style=\"bottom:-1px; right:-1px; border-bottom:2px solid; border-right:2px solid;\"><\u002Fdiv>\n\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;\">\n          <span class=\"tdv-pixel\" style=\"font-size:10px; color:#67e8f9;\">PRICE FEED<\u002Fspan>\n          <span class=\"tdv-pixel\" style=\"font-size:8px; color:#3f3f46;\">{{ pointCountLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:relative; height:360px;\">\n          <svg viewBox=\"0 0 1000 340\" preserveAspectRatio=\"none\" style=\"width:100%; height:100%; display:block; cursor:crosshair;\" onmousemove=\"{{ onPlotMove }}\" onmouseleave=\"{{ onPlotLeave }}\">\n            <sc-for list=\"{{ gridLines }}\" as=\"g\" hint-placeholder-count=\"5\">\n              <line x1=\"64\" x2=\"982\" y1=\"{{ g.y }}\" y2=\"{{ g.y }}\" stroke=\"#164e63\" stroke-opacity=\"0.35\" stroke-dasharray=\"2 6\"><\u002Fline>\n              <text x=\"58\" y=\"{{ g.ty }}\" fill=\"#4b5563\" font-size=\"11\" font-family=\"JetBrains Mono, monospace\" text-anchor=\"end\">{{ g.label }}<\u002Ftext>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ xTicks }}\" as=\"t\" hint-placeholder-count=\"5\">\n              <text x=\"{{ t.x }}\" y=\"332\" fill=\"#4b5563\" font-size=\"11\" font-family=\"JetBrains Mono, monospace\" text-anchor=\"middle\">{{ t.label }}<\u002Ftext>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ hasPrice }}\" hint-placeholder-val=\"{{ true }}\">\n              <polygon key=\"a{{ chartKey }}\" points=\"{{ areaPoints }}\" fill=\"{{ lineColor }}\" fill-opacity=\"0.06\" style=\"animation:area-in 1.1s ease-out;\"><\u002Fpolygon>\n              <polyline key=\"l{{ chartKey }}\" points=\"{{ linePoints }}\" fill=\"none\" stroke=\"{{ lineColor }}\" stroke-width=\"2\" vector-effect=\"non-scaling-stroke\" stroke-linejoin=\"round\" stroke-linecap=\"round\" style=\"stroke-dasharray:2600; animation:draw-line 1s ease-out forwards; filter:drop-shadow(0 0 4px {{ lineGlow }});\"><\u002Fpolyline>\n              <circle cx=\"{{ lastCx }}\" cy=\"{{ lastCy }}\" r=\"3.5\" fill=\"{{ lineColor }}\" stroke=\"#000\" stroke-width=\"1\" style=\"filter:drop-shadow(0 0 6px {{ lineGlow }});\"><\u002Fcircle>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hoverActive }}\" hint-placeholder-val=\"{{ false }}\">\n              <line x1=\"{{ hoverX }}\" x2=\"{{ hoverX }}\" y1=\"18\" y2=\"310\" stroke=\"#22d3ee\" stroke-opacity=\"0.5\" stroke-width=\"1\" stroke-dasharray=\"3 3\" vector-effect=\"non-scaling-stroke\"><\u002Fline>\n              <line x1=\"64\" x2=\"982\" y1=\"{{ hoverY }}\" y2=\"{{ hoverY }}\" stroke=\"#22d3ee\" stroke-opacity=\"0.5\" stroke-width=\"1\" stroke-dasharray=\"3 3\" vector-effect=\"non-scaling-stroke\"><\u002Fline>\n              <circle cx=\"{{ hoverX }}\" cy=\"{{ hoverY }}\" r=\"4\" fill=\"#22d3ee\" stroke=\"#000\" stroke-width=\"1\"><\u002Fcircle>\n            <\u002Fsc-if>\n          <\u002Fsvg>\n          <sc-if value=\"{{ hoverActive }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"tdv-mono\" style=\"position:absolute; top:8px; left:{{ tooltipLeft }}; transform:translateX(-50%); background:#050607; border:1px solid rgba(34,211,238,0.5); box-shadow:0 0 12px rgba(34,211,238,0.25); padding:4px 8px; font-size:11px; white-space:nowrap; pointer-events:none;\">\n              <span style=\"color:#67e8f9;\">{{ hoverLabel }}<\u002Fspan>&nbsp;&nbsp;<span style=\"color:{{ lineColor }};\">{{ hoverPriceStr }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n\n        <div style=\"position:relative; border:1px solid rgba(34,211,238,0.3); background:rgba(8,14,18,0.6); padding:16px;\">\n          <div class=\"tdv-corner\" style=\"top:-1px; left:-1px; border-top:2px solid; border-left:2px solid;\"><\u002Fdiv>\n          <div class=\"tdv-corner\" style=\"bottom:-1px; right:-1px; border-bottom:2px solid; border-right:2px solid;\"><\u002Fdiv>\n          <div class=\"tdv-pixel\" style=\"font-size:10px; color:#67e8f9; margin-bottom:12px;\">P&amp;L<\u002Fdiv>\n          <div key=\"{{ pnlPulseKey }}\" class=\"tdv-mono\" style=\"font-size:32px; font-weight:700; color:{{ pnlColor }}; animation:{{ pnlAnim }} 0.9s ease-out;\">\n            {{ pnlStr }}\n          <\u002Fdiv>\n          <div class=\"tdv-pixel\" style=\"font-size:8px; color:#52525b; margin-top:8px;\">{{ pnlSideLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n          <div style=\"border:1px solid rgba(63,63,70,0.6); background:rgba(8,14,18,0.6); padding:14px;\">\n            <div class=\"tdv-pixel\" style=\"font-size:8px; color:#71717a; margin-bottom:8px;\">POSITION<\u002Fdiv>\n            <div class=\"tdv-mono\" style=\"font-size:20px; font-weight:600; color:#e5e7eb;\">{{ qtyStr }}<\u002Fdiv>\n            <div class=\"tdv-mono\" style=\"font-size:11px; color:#71717a; margin-top:6px;\">AVG {{ avgPriceStr }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(63,63,70,0.6); background:rgba(8,14,18,0.6); padding:14px;\">\n            <div class=\"tdv-pixel\" style=\"font-size:8px; color:#71717a; margin-bottom:8px;\">CASH<\u002Fdiv>\n            <div class=\"tdv-mono\" style=\"font-size:20px; font-weight:600; color:#e5e7eb;\">{{ cashStr }}<\u002Fdiv>\n            <div class=\"tdv-mono\" style=\"font-size:11px; color:#71717a; margin-top:6px;\">BUYING PWR<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position:relative; border:1px solid rgba(34,211,238,0.3); background:rgba(8,14,18,0.6); padding:16px; flex:1; display:flex; flex-direction:column; gap:14px;\">\n          <div class=\"tdv-corner\" style=\"top:-1px; left:-1px; border-top:2px solid; border-left:2px solid;\"><\u002Fdiv>\n          <div class=\"tdv-corner\" style=\"top:-1px; right:-1px; border-top:2px solid; border-right:2px solid;\"><\u002Fdiv>\n          <div class=\"tdv-pixel\" style=\"font-size:10px; color:#67e8f9;\">ORDER TICKET<\u002Fdiv>\n\n          <div>\n            <div class=\"tdv-pixel\" style=\"font-size:8px; color:#71717a; margin-bottom:6px;\">SIZE<\u002Fdiv>\n            <input class=\"tdv-mono\" type=\"number\" min=\"0\" step=\"1\" value=\"{{ sizeValue }}\" onchange=\"{{ onSizeChange }}\" style=\"width:100%; box-sizing:border-box; background:#000; border:1px solid rgba(34,211,238,0.4); color:#22d3ee; font-size:18px; padding:8px 10px; outline:none;\">\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:8px;\">\n            <sc-for list=\"{{ sizeChips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n              <button class=\"tdv-pixel\" onclick=\"{{ chip.onSelect }}\" style=\"font-size:9px; padding:8px 0; background:{{ chip.bg }}; color:#a5f3fc; border:1px solid rgba(34,211,238,0.35); cursor:pointer;\" style-hover=\"background:rgba(34,211,238,0.18);\" style-active=\"transform:scale(0.94);\">{{ chip.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:auto;\">\n            <button class=\"tdv-pixel\" onclick=\"{{ handleBuy }}\" style=\"font-size:12px; padding:14px 0; background:rgba(74,222,128,0.12); color:#4ade80; border:1px solid #4ade80; cursor:pointer; box-shadow:0 0 0px rgba(74,222,128,0);\" style-hover=\"background:rgba(74,222,128,0.22); box-shadow:0 0 16px rgba(74,222,128,0.5);\" style-active=\"transform:scale(0.95); box-shadow:0 0 24px rgba(74,222,128,0.8);\">BUY<\u002Fbutton>\n            <button class=\"tdv-pixel\" onclick=\"{{ handleSell }}\" style=\"font-size:12px; padding:14px 0; background:rgba(248,113,113,0.12); color:#f87171; border:1px solid #f87171; cursor:pointer; box-shadow:0 0 0px rgba(248,113,113,0);\" style-hover=\"background:rgba(248,113,113,0.22); box-shadow:0 0 16px rgba(248,113,113,0.5);\" style-active=\"transform:scale(0.95); box-shadow:0 0 24px rgba(248,113,113,0.8);\">SELL<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 860},\n  &quot;priceHistory&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [\n    {&quot;date&quot;:&quot;09:30&quot;,&quot;price&quot;:182.10},{&quot;date&quot;:&quot;09:45&quot;,&quot;price&quot;:183.40},{&quot;date&quot;:&quot;10:00&quot;,&quot;price&quot;:181.90},\n    {&quot;date&quot;:&quot;10:15&quot;,&quot;price&quot;:184.60},{&quot;date&quot;:&quot;10:30&quot;,&quot;price&quot;:186.20},{&quot;date&quot;:&quot;10:45&quot;,&quot;price&quot;:185.30},\n    {&quot;date&quot;:&quot;11:00&quot;,&quot;price&quot;:188.10},{&quot;date&quot;:&quot;11:15&quot;,&quot;price&quot;:190.50},{&quot;date&quot;:&quot;11:30&quot;,&quot;price&quot;:189.20},\n    {&quot;date&quot;:&quot;11:45&quot;,&quot;price&quot;:191.80}\n  ], &quot;tsType&quot;: &quot;{date: string, price: number}[]&quot;},\n  &quot;position&quot;: {&quot;editor&quot;: null, &quot;default&quot;: {&quot;qty&quot;: 120, &quot;avgPrice&quot;: 183.75}, &quot;tsType&quot;: &quot;{qty: number, avgPrice: number}&quot;},\n  &quot;cash&quot;: {&quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 24580.32, &quot;tsType&quot;: &quot;number&quot;},\n  &quot;pnl&quot;: {&quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 962.4, &quot;tsType&quot;: &quot;number&quot;},\n  &quot;onBuy&quot;: {&quot;editor&quot;: null, &quot;tsType&quot;: &quot;(size: number) =&gt; void&quot;},\n  &quot;onSell&quot;: {&quot;editor&quot;: null, &quot;tsType&quot;: &quot;(size: number) =&gt; void&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    size: 1,\n    pnlPulseKey: 0,\n    priceKey: 0,\n    hoverIndex: null,\n  };\n\n  componentDidUpdate(prevProps) {\n    if (prevProps.pnl !== this.props.pnl) {\n      this.setState(s => ({ pnlPulseKey: s.pnlPulseKey + 1 }));\n    }\n    const prevLen = (prevProps.priceHistory || []).length;\n    const prevLast = prevLen ? prevProps.priceHistory[prevLen - 1].price : undefined;\n    const curHist = this.props.priceHistory || [];\n    const curLast = curHist.length ? curHist[curHist.length - 1].price : undefined;\n    if (prevLast !== curLast) {\n      this.setState(s => ({ priceKey: s.priceKey + 1 }));\n    }\n  }\n\n  fmt(n) {\n    if (typeof n !== 'number' || Number.isNaN(n)) return '--';\n    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n  }\n\n  renderVals() {\n    const priceHistory = this.props.priceHistory || [];\n    const position = this.props.position || { qty: 0, avgPrice: 0 };\n    const cash = typeof this.props.cash === 'number' ? this.props.cash : 0;\n    const pnl = typeof this.props.pnl === 'number' ? this.props.pnl : 0;\n    const size = this.state.size;\n\n    const lastPrice = priceHistory.length ? priceHistory[priceHistory.length - 1].price : null;\n    const pnlPositive = pnl >= 0;\n    const qty = position.qty || 0;\n\n    // ---- chart geometry (viewBox 1000 x 340) ----\n    const VBW = 1000, VBH = 340;\n    const padL = 64, padR = 18, padT = 18, padB = 30;\n    const innerW = VBW - padL - padR;\n    const innerH = VBH - padT - padB;\n    const n = priceHistory.length;\n    const prices = priceHistory.map(d => d.price);\n    let min = n ? Math.min(...prices) : 0;\n    let max = n ? Math.max(...prices) : 1;\n    if (min === max) { min -= 1; max += 1; }\n    const xAt = (i) => n <= 1 ? padL + innerW / 2 : padL + (i / (n - 1)) * innerW;\n    const yAt = (p) => padT + (1 - (p - min) / (max - min)) * innerH;\n\n    const pts = priceHistory.map((d, i) => ({ x: xAt(i), y: yAt(d.price) }));\n    const linePoints = pts.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');\n    const areaPoints = n\n      ? padL.toFixed(1) + ',' + (padT + innerH).toFixed(1) + ' ' + linePoints + ' ' + (padL + innerW).toFixed(1) + ',' + (padT + innerH).toFixed(1)\n      : '';\n    const lineColor = pnlPositive ? '#4ade80' : '#f87171';\n    const lineGlow = pnlPositive ? 'rgba(74,222,128,0.6)' : 'rgba(248,113,113,0.6)';\n\n    const gridLines = [];\n    for (let i = 0; i <= 4; i++) {\n      const frac = i / 4;\n      const y = padT + frac * innerH;\n      const price = min + (max - min) * (1 - frac);\n      gridLines.push({ y: y.toFixed(1), ty: (y + 3.5).toFixed(1), label: this.fmt(price) });\n    }\n\n    const xTicks = [];\n    if (n) {\n      const seen = {};\n      [0, 0.25, 0.5, 0.75, 1].forEach(f => {\n        const idx = Math.round(f * (n - 1));\n        if (seen[idx]) return;\n        seen[idx] = 1;\n        xTicks.push({ x: xAt(idx).toFixed(1), label: priceHistory[idx].date });\n      });\n    }\n\n    // ---- hover crosshair ----\n    let hi = this.state.hoverIndex;\n    if (hi != null && (hi < 0 || hi >= n)) hi = null;\n    const hoverActive = hi != null && n > 0;\n    const hoverPt = hoverActive ? pts[hi] : null;\n\n    const chipVals = [1, 5, 10, 25];\n    const sizeChips = chipVals.map(v => ({\n      label: 'x' + v,\n      bg: size === v ? 'rgba(34,211,238,0.22)' : 'transparent',\n      onSelect: () => this.setState({ size: v }),\n    }));\n\n    return {\n      priceHistory,\n      hasPrice: lastPrice !== null,\n      lastPriceStr: lastPrice !== null ? this.fmt(lastPrice) : '--',\n      priceKey: this.state.priceKey,\n      pointCountLabel: priceHistory.length + ' PTS',\n\n      chartKey: n,\n      linePoints,\n      areaPoints,\n      lineColor,\n      lineGlow,\n      gridLines,\n      xTicks,\n      lastCx: n ? pts[n - 1].x.toFixed(1) : 0,\n      lastCy: n ? pts[n - 1].y.toFixed(1) : 0,\n      hoverActive,\n      hoverX: hoverPt ? hoverPt.x.toFixed(1) : 0,\n      hoverY: hoverPt ? hoverPt.y.toFixed(1) : 0,\n      hoverLabel: hoverActive ? priceHistory[hi].date : '',\n      hoverPriceStr: hoverActive ? '$' + this.fmt(priceHistory[hi].price) : '',\n      tooltipLeft: hoverActive ? ((pts[hi].x / VBW) * 100).toFixed(2) + '%' : '50%',\n      onPlotMove: (e) => {\n        if (!n) return;\n        const rect = e.currentTarget.getBoundingClientRect();\n        if (!rect.width) return;\n        const px = ((e.clientX - rect.left) / rect.width) * VBW;\n        const frac = (px - padL) / innerW;\n        let idx = Math.round(frac * (n - 1));\n        idx = Math.max(0, Math.min(n - 1, idx));\n        if (idx !== this.state.hoverIndex) this.setState({ hoverIndex: idx });\n      },\n      onPlotLeave: () => {\n        if (this.state.hoverIndex != null) this.setState({ hoverIndex: null });\n      },\n\n      pnlPositive,\n      pnlColor: pnlPositive ? '#4ade80' : '#f87171',\n      pnlAnim: pnlPositive ? 'pulse-pos' : 'pulse-neg',\n      pnlPulseKey: this.state.pnlPulseKey,\n      pnlStr: (pnlPositive ? '+' : '-') + '$' + this.fmt(Math.abs(pnl)),\n      pnlSideLabel: pnlPositive ? 'UNREALIZED GAIN' : 'UNREALIZED LOSS',\n\n      qtyStr: (qty > 0 ? '+' : '') + qty + ' SH',\n      avgPriceStr: '$' + this.fmt(position.avgPrice || 0),\n      cashStr: '$' + this.fmt(cash),\n\n      sizeValue: size,\n      onSizeChange: (e) => {\n        const v = Math.max(0, Number(e.target.value) || 0);\n        this.setState({ size: v });\n      },\n      sizeChips,\n\n      handleBuy: () => { if (this.props.onBuy) this.props.onBuy(this.state.size); },\n      handleSell: () => { if (this.props.onSell) this.props.onSell(this.state.size); },\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
